<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#2e2620"/>
  <!-- 琴の胴体（長方形） -->
  <rect x="8" y="26" width="48" height="12" rx="3" fill="#b09050"/>
  <!-- 弦（7本） -->
  <line x1="10" y1="22" x2="10" y2="42" stroke="#dcc8a8" stroke-width="1.2"/>
  <line x1="17" y1="21" x2="17" y2="43" stroke="#dcc8a8" stroke-width="1.2"/>
  <line x1="24" y1="20" x2="24" y2="44" stroke="#dcc8a8" stroke-width="1.2"/>
  <line x1="32" y1="20" x2="32" y2="44" stroke="#dcc8a8" stroke-width="1.2"/>
  <line x1="40" y1="20" x2="40" y2="44" stroke="#dcc8a8" stroke-width="1.2"/>
  <line x1="47" y1="21" x2="47" y2="43" stroke="#dcc8a8" stroke-width="1.2"/>
  <line x1="54" y1="22" x2="54" y2="42" stroke="#dcc8a8" stroke-width="1.2"/>
  <!-- 柱（ことじ）3個 -->
  <rect x="14" y="30" width="3" height="8" rx="1" fill="#f7f2eb"/>
  <rect x="30" y="30" width="3" height="8" rx="1" fill="#f7f2eb"/>
  <rect x="46" y="30" width="3" height="8" rx="1" fill="#f7f2eb"/>
